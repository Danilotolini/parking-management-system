server.port=3003

spring.datasource.url=jdbc:mysql://localhost:3306/garage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# garante timezone consistente
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# URL do simulador (enunciado)
garage.simulator.base-url=http://localhost:3000
garage.bootstrap.enabled=true
garage.seed.enabled=false
garage.bootstrap.use-simulator-occupied=false

